<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ToDo App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>ToDoアプリ</h1>

    <section class="form-section">
      <h2>新規タスク追加</h2>
      <form id="todo-form">
        <input type="text" id="task-title" placeholder="タスク名を入力" required>
        <div class="form-row">
          <label>期限: <input type="date" id="task-deadline"></label>
          <label>重要度: 
            <select id="task-importance">
              <option value="1">1 (低)</option>
              <option value="2">2</option>
              <option value="3" selected>3</option>
              <option value="4">4</option>
              <option value="5">5 (高)</option>
            </select>
          </label>
          <div class="form-item">
            <span class="form-label">カテゴリ:</span> 
            <div class="custom-dropdown" id="category-dropdown">
              <div class="dropdown-trigger" id="dropdown-trigger">
                <span id="selected-category-label">カテゴリを選択</span>
                <span class="dropdown-arrow">▼</span>
              </div>
              <div class="dropdown-menu" id="dropdown-menu">
                <ul class="dropdown-list" id="custom-category-list"></ul>
                <div class="dropdown-footer">
                  <div class="inline-add-trigger" id="inline-add-trigger">＋ 新しいカテゴリを追加</div>
                  <div class="inline-add-form" id="inline-add-form" style="display: none;">
                    <input type="text" id="inline-category-name" placeholder="カテゴリ名を入力">
                    <button type="button" id="btn-inline-category-save">確定</button>
                  </div>
                </div>
              </div>
            </div>
            <input type="hidden" id="task-category-id" required>
          </div>
        </div>
        <button type="submit">タスクを追加</button>
      </form>
    </section>

    <section class="config-section">
      <h2>⚙️ 優先度スコアのチューニング</h2>
      <p style="font-size: 13px; color: #666; margin: -5px 0 15px 0;">数値を変更すると、リアルタイムでタスクの「オススメ順」が入れ替わります。</p>
      <div class="tuning-grid">
        <div class="tuning-item">
          <label for="weight-importance">🔥 重要度の強さ（倍率）</label>
          <input type="number" id="weight-importance" min="0" max="100" value="10" step="1">
        </div>
        <div class="tuning-item">
          <label for="weight-deadline">⏳ 期限の焦り度（倍率）</label>
          <input type="number" id="weight-deadline" min="0" max="100" value="1" step="0.5">
        </div>
        <div class="tuning-action">
          <button type="button" id="btn-save-default" class="primary-btn">デフォルトとして設定</button>
          <button type="button" id="btn-restore-default" class="secondary-btn">デフォルトに戻す</button>
        </div>
      </div>
    </section>

    <div class="main-content">
      <section class="list-section">
        <h2>タスク一覧 (オススメ順)</h2>
        <ul id="task-list"></ul>
      </section>

      <section class="calendar-section">
        <h2>カレンダー</h2>
        <div id="calendar-controls">
          <button id="prev-month">&lt;</button>
          <span id="calendar-month-year"></span>
          <button id="next-month">&gt;</button>
        </div>
        <div class="calendar-grid-header">
          <div>日</div><div>月</div><div>火</div><div>水</div><div>木</div><div>金</div><div>土</div>
        </div>
        <div id="calendar-grid" class="calendar-grid"></div>
        <div style="margin-top: 30px; border-top: 1px solid #eee; padding-top: 15px;">
          <h3 style="font-size: 16px; color: #555; margin-bottom: 10px;">📋 期限のないタスク</h3>
          <ul id="no-deadline-list"></ul>
        </div>
      </section>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
